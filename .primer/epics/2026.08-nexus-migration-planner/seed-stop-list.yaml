# seed-stop-list.yaml
# Core-table stop-list for closure dampening (ADR-026 Decision 3 / FR5).
#
# Tables on this list dampen reference-field closure expansion into a
# DATA_PREREQUISITE finding instead of pulling the target table's records
# into the selection -- they hold instance data (users, groups, choices,
# CIs, ...), not migratable config.
#
# Produced by Story 00 (S0 closure-scale spike): the mandatory baseline
# (sys_user, sys_user_group, sys_choice, cmdb_ci) from the story brief, plus
# any "kin" observed as real reference targets in the fetched schema-graph
# edge set (artifacts/replatform-proof/alectri/s0-platform-artifacts-*.json)
# that are clearly instance data. The live fetch against alectri's 9
# artifact tables (sys_script, sys_script_include, sys_ui_policy,
# sys_script_client, sys_ui_action, sysauto_script, sys_hub_flow,
# sys_hub_action_type_definition, wf_workflow) found only 8 declared
# reference edges, all targeting config tables (sys_rest_message,
# sys_rest_message_fn, sys_ui_view, self-references) -- no additional kin
# were observed, so this list stays at the mandatory baseline. See
# s0-spike-results.md for the full measurement and the caveat this implies.
#
# Story 04's closure builder (plan-builder-closure-waves) loads this file as
# its starting default; it is expected to grow as later stories add
# co-capture rules (e.g. sys_security_acl_role) and real customer estates
# surface more instance-data reference targets.

- sys_user
- sys_user_group
- sys_choice
- cmdb_ci
