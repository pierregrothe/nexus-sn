name: Validate Templates

on:
  pull_request:
    paths:
      - "templates/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Validate all changed templates
        run: |
          git diff --name-only origin/main...HEAD -- templates/ | \
            grep "\.yaml$" | \
            xargs -I{} poetry run python -m nexus.templates.validator {}
