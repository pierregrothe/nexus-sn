id: nowassist-incident-triage-readiness
version: "1.0.0"
description: Pre-deploy readiness for the incident-triage NowAssist skill.
applies_to:
  - nowassist-incident-triage
rules:
  - id: target-scope-records-exist
    description: At least one sys_scope record is captured for resolution.
    severity: ERROR
    phase: PRE_APPLY
    scope:
      kind: table
      table: sys_scope
    required_tables:
      - sys_scope
    logic: AND_ALL
    constraints:
      - operator: count_gte
        table: sys_scope
        threshold: 1
        filter: []
