repos:
  - repo: local
    hooks:
      - id: black
        name: Format check (black)
        entry: poetry run black --check src/nexus/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: ruff
        name: Lint (ruff)
        entry: poetry run ruff check src/nexus/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: mypy
        name: Type check (mypy)
        entry: poetry run mypy src/nexus/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pyright
        name: Type check (pyright)
        entry: poetry run pyright src/nexus/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: Run test suite
        entry: poetry run pytest -q --tb=short -p no:cacheprovider --override-ini="addopts="
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
