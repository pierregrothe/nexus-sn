# Cross-platform pre-commit configuration.
# Hooks invoke project-venv tools via .claude/hooks/_venv_run.py which resolves
# .venv/Scripts/<tool>.exe on Windows and .venv/bin/<tool> on macOS / Linux.
# Assumes Poetry's virtualenvs.in-project = true (see CLAUDE.md).
#
# Semgrep runs in pre-commit's own isolated env (additional_dependencies) so
# its 50+ transitive deps don't pollute the project's poetry lockfile.
repos:
  - repo: local
    hooks:
      - id: black
        name: Format check (black)
        entry: python .claude/hooks/_venv_run.py black --check src/nexus/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: ruff
        name: Lint (ruff)
        entry: python .claude/hooks/_venv_run.py ruff check src/nexus/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: mypy
        name: Type check (mypy)
        entry: python .claude/hooks/_venv_run.py mypy src/nexus/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pyright
        name: Type check (pyright)
        entry: python .claude/hooks/_venv_run.py pyright src/nexus/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: file-size
        name: File size limits (ADR-023)
        entry: python scripts/check_file_sizes.py
        language: system
        pass_filenames: false
        always_run: true
      - id: semgrep
        name: Semantic governance (semgrep)
        entry: semgrep --config .semgrep/rules.yml --error --quiet src/ tests/
        language: python
        additional_dependencies: ["semgrep==1.162.0"]
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: Run test suite
        entry: python .claude/hooks/_venv_run.py pytest -q --tb=short -p no:cacheprovider -n auto
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
