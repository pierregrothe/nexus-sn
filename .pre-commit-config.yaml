# Hooks invoke .venv/bin/<tool> directly to bypass Poetry overhead.
# Assumes Poetry's virtualenvs.in-project = true (see CLAUDE.md).
# POSIX paths only -- on Windows, activate .venv/Scripts/ first or replace
# entries with Poetry-managed paths.
repos:
  - repo: local
    hooks:
      - id: black
        name: Format check (black)
        entry: .venv/bin/black --check src/nexus/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: ruff
        name: Lint (ruff)
        entry: .venv/bin/ruff check src/nexus/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: mypy
        name: Type check (mypy)
        entry: .venv/bin/mypy src/nexus/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pyright
        name: Type check (pyright)
        entry: .venv/bin/pyright src/nexus/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: Run test suite
        entry: .venv/bin/pytest -q --tb=short -p no:cacheprovider --override-ini=addopts=
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
