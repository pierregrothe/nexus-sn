<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEXUS -- Core SC Demo</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/asciinema-player@3.15.1/dist/bundle/asciinema-player.css">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 32px;
    }
    h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.3rem; }
    p.sub { color: #8b949e; margin: 0 0 24px; font-size: 0.9rem; }
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    nav button {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color 0.15s;
    }
    nav button:hover  { border-color: #58a6ff; color: #58a6ff; }
    nav button.active { border-color: #3fb950; color: #3fb950; background: #0d1117; }
    #player { max-width: 1440px; }
  </style>
</head>
<body>
  <h1>NEXUS -- Core SC: Pre-Demo Instance Briefing</h1>
  <p class="sub">Select an act below to play it in the terminal viewer.</p>

  <nav id="nav"></nav>
  <div id="player"></div>

  <script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.15.1/dist/bundle/asciinema-player.min.js"></script>
  <script>
    const ACTS = [
      { label: "Act 1 -- Know Your Environment",       file: "cast/act1-know-your-environment.cast" },
      { label: "Act 2 -- Pick the Right Instance",     file: "cast/act2-pick-the-right-instance.cast" },
      { label: "Act 3 -- Answer the Hard Questions",   file: "cast/act3-answer-hard-questions.cast" },
      { label: "Act 4 -- Data Model Question",         file: "cast/act4-data-model-question.cast" },
      { label: "Act 5 -- Leave a Baseline",            file: "cast/act5-leave-a-baseline.cast" },
    ];

    const nav = document.getElementById("nav");
    const container = document.getElementById("player");
    let current = null;

    function load(index) {
      // Update nav buttons
      nav.querySelectorAll("button").forEach((b, i) => {
        b.classList.toggle("active", i === index);
      });

      // Destroy previous player
      container.innerHTML = "";
      current = null;

      // Create new player
      current = AsciinemaPlayer.create(
        ACTS[index].file,
        container,
        {
          cols: 180,
          rows: 40,
          autoPlay: true,
          speed: 1.0,
          theme: "monokai",
          terminalFontSize: "small",
          fit: "width",
        }
      );
    }

    // Build nav buttons
    ACTS.forEach((act, i) => {
      const btn = document.createElement("button");
      btn.textContent = act.label;
      btn.onclick = () => load(i);
      nav.appendChild(btn);
    });

    // Auto-load act 1
    load(0);
  </script>
</body>
</html>
