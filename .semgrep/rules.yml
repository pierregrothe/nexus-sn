# .semgrep/rules.yml
# Semantic governance rules that complement ruff's syntactic checks.
# Each rule traces to an ADR; see metadata.adr.
# Author: Pierre Grothe
# Date: 2026-05-08
rules:
  - id: no-lru-cache-none
    languages: [python]
    severity: ERROR
    message: |
      @lru_cache(maxsize=None) is forbidden. Use @cache from functools.
      It expresses the same unbounded-cache intent more clearly.
    pattern-either:
      - pattern: "@lru_cache(maxsize=None)"
      - pattern: "@functools.lru_cache(maxsize=None)"
    metadata:
      adr: ADR-016
      category: governance

  - id: no-unittest-testcase
    languages: [python]
    severity: ERROR
    message: |
      unittest.TestCase subclasses are forbidden. Use plain pytest functions:
        def test_<function>_<scenario>() -> None: ...
    paths:
      include:
        - "**/tests/**"
    pattern-either:
      - pattern: |
          class $X(unittest.TestCase): ...
      - pattern: |
          class $X(TestCase): ...
    metadata:
      adr: ADR-016
      category: governance

  - id: caching-must-use-cached-decorator
    languages: [python]
    severity: ERROR
    message: |
      Direct use of functools.cache, functools.lru_cache, and
      functools.cached_property is forbidden in src/nexus/. Use the
      @cached decorator from nexus.cache (ADR-017).
    paths:
      include:
        - "**/src/nexus/**"
    pattern-either:
      - pattern: "@cache"
      - pattern: "@functools.cache"
      - pattern: "@cached_property"
      - pattern: "@functools.cached_property"
      - pattern: "@lru_cache"
      - pattern: "@lru_cache(...)"
      - pattern: "@functools.lru_cache"
      - pattern: "@functools.lru_cache(...)"
    metadata:
      adr: ADR-017
      category: governance

  - id: cached-requires-explicit-ttl
    languages: [python]
    severity: ERROR
    message: |
      @cached requires an explicit ttl= keyword. Use ttl=None for
      infinite-within-process caching, or ttl=N for a TTL in seconds.
      See ADR-017.
    pattern-either:
      - pattern: "@cached()"
      - pattern: "@cached(persist=...)"
      - pattern: "@cached(persist=..., namespace=...)"
      - pattern: "@cached(namespace=...)"
      - pattern: "@cached(key_fn=...)"
      - pattern: "@cached(persist=..., key_fn=...)"
      - pattern: "@cached(persist=..., namespace=..., key_fn=...)"
      - pattern: "@cached(namespace=..., key_fn=...)"
    metadata:
      adr: ADR-017
      category: governance

  - id: cached-persist-requires-namespace
    languages: [python]
    severity: ERROR
    message: |
      @cached(persist=True) requires namespace=. The namespace becomes the
      disk-cache key prefix and prevents collisions between modules.
      See ADR-017.
    pattern-either:
      - pattern: "@cached(ttl=..., persist=True)"
      - pattern: "@cached(ttl=..., persist=True, key_fn=...)"
    metadata:
      adr: ADR-017
      category: governance

  - id: external-keychain-must-use-wrapper
    languages: [python]
    severity: ERROR
    message: |
      Direct use of KeychainClient(service_prefix=...) is forbidden in src/nexus/.
      For NEXUS-owned secrets, use the default KeychainClient(). For reading
      other apps' keychain entries (e.g., Claude Code's), use
      ExternalKeychainClient() from nexus.auth (ADR-019).
    paths:
      include: ["**/src/nexus/**"]
    pattern-either:
      - pattern: KeychainClient(service_prefix=$X)
      - pattern: KeychainClient(service_prefix=$X, ...)
    metadata:
      adr: ADR-019
      category: governance

  - id: no-stub-see-docstring
    languages: [python]
    severity: ERROR
    message: |
      Stub docstrings like '"""See OtherClass.method."""' add no value.
      Either copy the canonical docstring or write a one-line behavior
      description (ADR-019).
    paths:
      include: ["**/src/nexus/**"]
    pattern-regex: '"""See [A-Z][A-Za-z]+\.[a-z_]+\.\s*"""'
    metadata:
      adr: ADR-019
      category: governance

  - id: enum-shadowing-label-dict
    languages: [python]
    severity: WARNING
    message: |
      A module-level dict[<EnumType>, str] mapping enum members to strings
      duplicates the enum's value field. Add a property to the enum
      (e.g., def label(self) -> str: return self.value.capitalize()) or call
      .value directly. Caught _TIER_LABEL in PR #6 (ADR-019).
    paths:
      include: ["**/src/nexus/**"]
    pattern: |
      $NAME: dict[$ENUM, str] = {
          $ENUM.$MEMBER: ...,
          ...
      }
    metadata:
      adr: ADR-019
      category: governance

  - id: no-sys-stdout-write
    languages: [python]
    severity: ERROR
    message: |
      Direct sys.stdout.write / sys.stderr.write is forbidden in src/nexus/.
      Use rich.Console (cli.py / capabilities/status_reporter.py pattern) or
      a plain print(..., flush=True) for runtime hooks. Caught in /simplify
      of PR #8 (ADR-020).
    paths:
      include: ["**/src/nexus/**"]
    pattern-either:
      - pattern: sys.stdout.write(...)
      - pattern: sys.stderr.write(...)
    metadata:
      adr: ADR-020
      category: governance
